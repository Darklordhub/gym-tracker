services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-tracker-postgres
    environment:
      POSTGRES_DB: gymtrackerdb
      POSTGRES_USER: gymuser
      POSTGRES_PASSWORD: gymtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gym-tracker-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=gymtrackerdb;Username=gymuser;Password=gymtracker
      Cors__AllowedOrigins__0: http://localhost:8080
      Cors__AllowedOrigins__1: http://127.0.0.1:8080
    ports:
      - "5224:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gym-tracker-frontend
    environment:
      VITE_BACKEND_PROXY_TARGET: http://backend:8080
    ports:
      - "8080:4173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
