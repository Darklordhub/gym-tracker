services:
  gym-tracker-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymtrackerdb}
      POSTGRES_USER: ${POSTGRES_USER:-gymuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - gym-tracker-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - gym-tracker-net

  gym-tracker-db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      gym-tracker-db:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymtrackerdb}
      POSTGRES_USER: ${POSTGRES_USER:-gymuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      PGHOST: gym-tracker-db
      PGPORT: 5432
      BACKUP_DIR: /backups
      BACKUP_RETENTION_COUNT: ${POSTGRES_BACKUP_RETENTION_COUNT:-7}
      BACKUP_INTERVAL_SECONDS: ${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "/scripts/postgres-backup.sh"]
    volumes:
      - ./scripts/postgres-backup.sh:/scripts/postgres-backup.sh:ro
      - gym-tracker-postgres-backups:/backups
    networks:
      - gym-tracker-net

  gym-tracker-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Http__UseHttpsRedirection: "false"
      ConnectionStrings__DefaultConnection: Host=gym-tracker-db;Port=5432;Database=${POSTGRES_DB:-gymtrackerdb};Username=${POSTGRES_USER:-gymuser};Password=${POSTGRES_PASSWORD:-change-me}
      Cors__AllowedOrigins__0: ${APP_BASE_URL:-http://localhost:8080}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY must be set to a random string at least 32 characters long}
      Jwt__Issuer: ${JWT_ISSUER:-gym-tracker-api}
      Jwt__Audience: ${JWT_AUDIENCE:-gym-tracker-app}
      Jwt__ExpirationHours: ${JWT_EXPIRATION_HOURS:-24}
      LegacyUser__Email: ${LEGACY_USER_EMAIL:-}
      LegacyUser__Password: ${LEGACY_USER_PASSWORD:-}
    depends_on:
      - gym-tracker-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gym-tracker-net

  gym-tracker-web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - gym-tracker-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - gym-tracker-net

volumes:
  gym-tracker-postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-gym-tracker_gym-tracker-postgres-data}
  gym-tracker-postgres-backups:
    name: ${POSTGRES_BACKUP_VOLUME_NAME:-gym-tracker_gym-tracker-postgres-backups}

networks:
  gym-tracker-net:
    driver: bridge
